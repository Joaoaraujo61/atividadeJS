<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="nome">Digite seu nome:</label>
    <input type="text" id="nome" name="nome"><br>

    <label for="num1">Digite o primeiro número:</label>
    <input type="text" id="num1" name="num1"><br> 

     <label for="num2">Digite o segundo número:</label>
    <input type="text" id="num2" name="num2"><br> 

    <label for="num3">Digite o terceiro número:</label>
    <input type="text" id="num3" name="num3"><br>

    <button id="mostrar" onclick="calcular()">Calcular</button><br>

    <p id="resultado"></p>

    <script>
        function calcular(){
            const nome = document.getElementById("nome").value
            const num1 = document.getElementById("num1").value
            const num2 = document.getElementById("num2").value
            const num3 = document.getElementById("num3").value

            const mult = num1*num2*num3

            document.getElementById("resultado").innerHTML = "Nome: "+nome+"<br>O resulrtado da multiplicação é: "+mult
        }
    </script>
</body>
</html>
