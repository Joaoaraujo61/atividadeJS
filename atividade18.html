<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="numero">Digite o primeiro numero:</label>
    <input type="number" name="numero1" id="numero1"><br>
    <label for="numero">Digite o segundo numero:</label>
    <input type="number" name="numero2" id="numero2"><br>

    <button onclick="somar()">Exibir resultado</button>
    <p id="p"></p>
    <script>
        function somar(){
            let numero1 = Number.parseInt(document.getElementById("numero1").value)
            let numero2 = Number.parseInt(document.getElementById("numero2").value)
            let soma = numero1+numero2

            document.getElementById("p"). innerHTML = ("Resultado: "  + soma)
        }
    </script>
</body>
</html>
