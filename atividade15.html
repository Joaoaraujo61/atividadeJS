<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <p>Excluir item?</p><br>
        <button type="submit" onclick="return excluir()">Excluir</button>
    </form>
    <script>
        function excluir(){
            return window.confirm("Deseja excluir item?")
        }
    </script> 
</body>
</html>
